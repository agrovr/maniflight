name: Maniflight repository diagnostics
description: Generate an evidence-backed readiness report for a GitHub repository.
author: Ashmit Grover

branding:
  icon: radio
  color: purple

inputs:
  path:
    description: Repository path to inspect.
    required: false
    default: .
  output-dir:
    description: Directory for scan artifacts and optional comparison.json output.
    required: false
    default: maniflight-report
  github-token:
    description: Optional repository-scoped token used only for read-only GitHub metadata.
    required: false
  repository:
    description: Repository in owner/name format. Defaults to the current Actions repository.
    required: false
  config:
    description: Path to a Maniflight YAML configuration file.
    required: false
    default: .maniflight.yml
  baseline-report:
    description: Optional path to a previous Maniflight report.json used for regression comparison.
    required: false
  fail-under:
    description: Optional readiness score threshold that makes the step fail.
    required: false
  fail-on-high:
    description: Fail when a high-severity finding is present.
    required: false
    default: "false"
  fail-on-regression:
    description: Fail only when the current scan introduces a regression from the baseline report.
    required: false
    default: "false"

outputs:
  overall-score:
    description: Overall readiness score from 0 to 100, when enough evidence is available.
  confidence:
    description: Percentage of weighted checks with usable evidence.
  high-findings:
    description: Number of high-severity findings.
  report-path:
    description: Path to the standalone HTML report.
  json-path:
    description: Path to the machine-readable JSON report.
  regressions:
    description: Number of newly introduced regressions when a baseline report is provided.
  comparison-path:
    description: Path to comparison.json when a baseline report is provided.

runs:
  using: node24
  main: dist/action/index.js
