version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Chicago
    open-pull-requests-limit: 5
    groups:
      npm-development:
        dependency-type: development
        update-types:
          - minor
          - patch
    ignore:
      # Runtime/toolchain majors are reviewed deliberately against the Node 22/24 matrix.
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
      # ncc 0.x minor releases may change the committed Action bundle substantially.
      - dependency-name: "@vercel/ncc"
        update-types:
          - version-update:semver-minor

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: America/Chicago
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
