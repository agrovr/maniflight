name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: ${{ matrix.os }} · Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: 22
            artifacts: false
          - os: ubuntu-latest
            node: 24
            artifacts: true
          - os: windows-latest
            node: 24
            artifacts: false
          - os: macos-latest
            node: 24
            artifacts: false
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting and types
        run: npm run check

      - name: Run tests
        run: npm test

      - name: Build distribution
        run: npm run build

      - name: Generate deterministic demo
        if: matrix.artifacts
        run: npm run demo

      - name: Verify committed artifacts
        if: matrix.artifacts
        run: git diff --exit-code -- dist demo

      - name: Verify release package contents
        if: matrix.artifacts
        run: npm pack --dry-run
